# Local-first stack: Postgres + FastAPI backend + built frontend.
#   docker compose up --build
# Then open http://localhost:5173  (login: demo / demo — change it, see README).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lawtrack
      POSTGRES_PASSWORD: lawtrack
      POSTGRES_DB: lawtrack
    ports:
      - "5432:5432"
    volumes:
      - lawtrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawtrack"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      LAWTRACK_DATABASE_URL: postgresql+psycopg://lawtrack:lawtrack@db:5432/lawtrack
      LAWTRACK_JWT_SECRET: ${LAWTRACK_JWT_SECRET:-change-me-in-production}
      LAWTRACK_SEED_ON_STARTUP: "true"
      # Pass your key through to enable live PDF analysis (optional):
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - lawtrack_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  lawtrack_pgdata:
  lawtrack_storage:
